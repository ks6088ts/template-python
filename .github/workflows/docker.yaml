name: docker

on:
  push:
    branches:
      - "main"
      - "feature/**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    name: build & scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # required for SARIF upload
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # to retrieve git tags
          persist-credentials: false

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true

      - name: Upload hadolint SARIF
        if: always() && hashFiles('hadolint.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint.sarif
          category: hadolint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute build metadata
        id: meta
        run: |
          echo "git_revision=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          tag=$(git describe --tags --abbrev=0 --always | sed -e 's/^v//')
          echo "git_tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build image (load to local docker)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ks6088ts/template-python:${{ steps.meta.outputs.git_tag }}
          build-args: |
            GIT_REVISION=${{ steps.meta.outputs.git_revision }}
            GIT_TAG=${{ steps.meta.outputs.git_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run image (smoke test)
        run: docker run --rm ks6088ts/template-python:${{ steps.meta.outputs.git_tag }} python -c "import template_python; print(template_python.__version__)"

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ks6088ts/template-python:${{ steps.meta.outputs.git_tag }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Trivy vulnerability scan (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ks6088ts/template-python:${{ steps.meta.outputs.git_tag }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
