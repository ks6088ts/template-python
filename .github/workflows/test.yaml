name: test

on:
  push:
    branches:
      - "main"
      - "feature/**"
      - "copilot/**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to a hardened, minimal token. Individual jobs widen as needed.
permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        platform:
          - "ubuntu-latest"
        python-version:
          - "3.13"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv with caching enabled
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install actionlint
        shell: bash
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest /usr/local/bin
      - name: Run CI tests
        shell: bash
        run: |
          make ci-test
          make ci-test-docs
